services:
  mysql:
    image: mysql:8.0
    container_name: capstone-mysql
    network_mode: host
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql

  fastapi:
    build: ./fastapi
    container_name: capstone-fastapi
    network_mode: host
    env_file:
      - .env

  nodejs:
    build: ./nodejs
    container_name: capstone-nodejs
    network_mode: host
    env_file:
      - .env

  springboot:
    build: ./springboot
    container_name: capstone-springboot
    network_mode: host
    env_file:
      - .env

  dotnet:
    build: ./dotnet
    container_name: capstone-dotnet
    network_mode: host
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    container_name: capstone-nginx
    network_mode: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi
      - nodejs
      - springboot
      - dotnet

volumes:
  mysql_data:

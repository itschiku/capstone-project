services:
  fastapi:
    build: ./fastapi
    container_name: capstone-fastapi
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - capstone-network

  nodejs:
    build: ./nodejs
    container_name: capstone-nodejs
    ports:
      - "5000:5000"
    env_file:
      - .env
    networks:
      - capstone-network

  springboot:
    build: ./springboot
    container_name: capstone-springboot
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      SPRINGBOOT_PORT: 8081
    networks:
      - capstone-network

  dotnet:
    build: ./dotnet
    container_name: capstone-dotnet
    ports:
      - "7000:7000"
    env_file:
      - .env
    networks:
      - capstone-network

  nginx:
    image: nginx:alpine
    container_name: capstone-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi
      - nodejs
      - springboot
      - dotnet
    networks:
      - capstone-network

networks:
  capstone-network:
    driver: bridge

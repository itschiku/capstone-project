events {
    worker_connections 1024;
}

http {
    upstream fastapi {
        server fastapi:8000;
    }
    
    upstream nodejs {
        server nodejs:5000;
    }
    
    upstream django {
        server django:8080;
    }
    
    upstream dotnet {
        server dotnet:7000;
    }
    
    server {
        listen 80;
        server_name _;
        
        location /api/fastapi {
            rewrite ^/api/fastapi/(.*) /$1 break;
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/nodejs {
            rewrite ^/api/nodejs/(.*) /$1 break;
            proxy_pass http://nodejs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/django {
            rewrite ^/api/django/(.*) /$1 break;
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/dotnet {
            rewrite ^/api/dotnet/(.*) /$1 break;
            proxy_pass http://dotnet;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location / {
            return 404;
        }
    }
}

events {
    worker_connections 1024;
}

http {
    upstream fastapi_backend {
        least_conn;
        server localhost:8000;
    }

    upstream nodejs_backend {
        least_conn;
        server localhost:5000;
    }

    upstream springboot_backend {
        least_conn;
        server localhost:8080;
    }

    upstream dotnet_backend {
        least_conn;
        server localhost:7000;
    }

    server {
        listen 80;
        server_name localhost;

        location /api/fastapi/ {
            rewrite ^/api/fastapi/(.*) /$1 break;
            proxy_pass http://fastapi_backend/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/nodejs/ {
            rewrite ^/api/nodejs/(.*) /$1 break;
            proxy_pass http://nodejs_backend/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/springboot/ {
            rewrite ^/api/springboot/(.*) /$1 break;
            proxy_pass http://springboot_backend/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/dotnet/ {
            rewrite ^/api/dotnet/(.*) /$1 break;
            proxy_pass http://dotnet_backend/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

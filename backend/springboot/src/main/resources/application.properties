# Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:capstone_db}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER:capstone_user}
spring.datasource.password=${DB_PASSWORD:capstone123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server Configuration
server.port=${SPRINGBOOT_PORT:8080}

# Logging
logging.level.root=${LOG_LEVEL:info}
logging.pattern.console=${LOG_FORMAT:json}
